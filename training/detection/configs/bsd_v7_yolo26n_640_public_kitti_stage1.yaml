# BSD v7 public-data route stage 1.
# Fine-tune the current n@640 model on v5 + balanced KITTI supplement.
# Current deployed candidate target is YOLO26n@640 because the quantized NB
# fits the hard <5 MB size gate while preserving better BSD proxy accuracy.
model:
  name: yolo26n
  pretrained: /root/autodl-tmp/BSD/artifacts/bsd_v6_yolo26n_640_stage1/weights/best.pt

data:
  yaml: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/dataset.yaml
  proxy_val: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/bdd_proxy_val.yaml
  nc: 4
  names: [person, bicycle, motorcycle, vehicle]

input:
  imgsz: 640
  channels: 3
  format: rgb

training:
  epochs: 100
  batch_size: 48
  patience: 30
  optimizer: SGD
  lr0: 0.004
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 2
  seed: 48
  close_mosaic: 15

augmentation:
  hsv_h: 0.015
  hsv_s: 0.6
  hsv_v: 0.35
  translate: 0.08
  scale: 0.4
  fliplr: 0.5
  mosaic: 0.6
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.15

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts
  name: bsd_v7_yolo26n_640_public_kitti_stage1
