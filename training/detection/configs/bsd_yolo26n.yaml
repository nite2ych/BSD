# BSD 4-class candidate smaller model for board-side throughput tests
# This is a placeholder config for comparing an n-class lightweight variant
# against the current yolo26s baseline.

model:
  name: yolo26n
  pretrained: /root/autodl-tmp/DMS/yolo26n.pt

data:
  train: /root/autodl-tmp/BSD/datasets/bsd/train
  val:   /root/autodl-tmp/BSD/datasets/bsd/val
  nc: 4
  names:
    0: person
    1: bicycle
    2: motorcycle
    3: vehicle

input:
  imgsz: 640
  channels: 3
  format: rgb

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  low_light:
    enabled: true
    dark_gamma: [0.3, 0.7]
    low_contrast: true
    gaussian_noise: [0, 5]
  mosaic: 1.0
  mixup: 0.1
  flip_lr: 0.5
  scale: 0.5

training:
  epochs: 100
  batch_size: 128
  patience: 30
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3

device:
  - 0
  - 1

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts
