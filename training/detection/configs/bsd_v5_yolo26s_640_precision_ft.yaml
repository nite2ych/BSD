# BSD v5 precision recovery: fine-tune YOLO26s@640 from the v5 last checkpoint.
# Goal: recover COCO-val precision toward v4 while keeping BDD proxy gains.
model:
  name: yolo26s
  pretrained: /root/autodl-tmp/BSD/artifacts/bsd_v5_yolo26s_640/weights/last.pt

data:
  yaml: /root/autodl-tmp/BSD/datasets/bsd_v5_balanced/dataset.yaml
  proxy_val: /root/autodl-tmp/BSD/datasets/bsd_v5_balanced/bdd_proxy_val.yaml
  nc: 4
  names: [person, bicycle, motorcycle, vehicle]

input:
  imgsz: 640
  channels: 3
  format: rgb

training:
  epochs: 80
  batch_size: 32
  patience: 25
  optimizer: SGD
  lr0: 0.002
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  seed: 43
  close_mosaic: 0

augmentation:
  hsv_h: 0.01
  hsv_s: 0.4
  hsv_v: 0.25
  translate: 0.05
  scale: 0.25
  fliplr: 0.5
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.0

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts
  name: bsd_v5_yolo26s_640_precision_ft
