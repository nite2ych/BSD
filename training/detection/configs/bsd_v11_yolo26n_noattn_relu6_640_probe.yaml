# BSD v11 speed probe: YOLO26n_noattn@640 with ReLU6 activation.
model:
  name: yolo26n_noattn_relu6
  architecture: /root/autodl-tmp/BSD/training/detection/models/yolo26n_noattn.yaml
  activation: ReLU6

data:
  yaml: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/dataset.yaml
  proxy_val: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/bdd_proxy_val.yaml
  nc: 4
  names: [person, bicycle, motorcycle, vehicle]

input:
  imgsz: 640
  channels: 3
  format: rgb

training:
  epochs: 1
  batch_size: 1
  patience: 1
  optimizer: SGD
  lr0: 0.006
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 0
  seed: 54
  close_mosaic: 0

augmentation:
  hsv_h: 0.015
  hsv_s: 0.6
  hsv_v: 0.35
  translate: 0.08
  scale: 0.4
  fliplr: 0.5
  mosaic: 0.6
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.15

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts/experiments
  name: bsd_v11_yolo26n_noattn_relu6_640_probe
