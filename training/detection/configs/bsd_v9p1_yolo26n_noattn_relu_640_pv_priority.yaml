# BSD v9.1 route: keep the fast v9 ReLU/no-attention architecture and recover
# person/vehicle recall through data and conservative fine-tuning.
model:
  name: yolo26n_noattn_relu_pv_priority
  architecture: /root/autodl-tmp/BSD/training/detection/models/yolo26n_noattn.yaml
  activation: ReLU
  pretrained: /root/autodl-tmp/BSD/artifacts/bsd_v9_yolo26n_noattn_relu_640_from_v8_ft/weights/best.pt

data:
  yaml: /root/autodl-tmp/BSD/datasets/bsd_v9p1_pv_priority/dataset.yaml
  proxy_val: /root/autodl-tmp/BSD/datasets/bsd_v9p1_pv_priority/bdd_proxy_val.yaml
  nc: 4
  names: [person, bicycle, motorcycle, vehicle]

input:
  imgsz: 640
  channels: 3
  format: rgb

training:
  epochs: 60
  batch_size: 48
  patience: 20
  optimizer: SGD
  lr0: 0.001
  lrf: 0.05
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 2
  seed: 61
  close_mosaic: 8

augmentation:
  hsv_h: 0.010
  hsv_s: 0.45
  hsv_v: 0.28
  translate: 0.05
  scale: 0.25
  fliplr: 0.5
  mosaic: 0.20
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.05

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts
  name: bsd_v9p1_yolo26n_noattn_relu_640_pv_priority
