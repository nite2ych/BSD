# BSD v8 speed route at 320: YOLO26n without C2PSA attention.
# This is a size/input-resolution experiment. Keep v8@640 and v7 unchanged.
model:
  name: yolo26n_noattn
  architecture: /root/autodl-tmp/BSD/training/detection/models/yolo26n_noattn.yaml
  pretrained: /root/autodl-tmp/BSD/artifacts/bsd_v8_yolo26n_noattn_640_stage1/weights/best.pt

data:
  yaml: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/dataset.yaml
  proxy_val: /root/autodl-tmp/BSD/datasets/bsd_v6_public_kitti/bdd_proxy_val.yaml
  nc: 4
  names: [person, bicycle, motorcycle, vehicle]

input:
  imgsz: 320
  channels: 3
  format: rgb

training:
  epochs: 100
  batch_size: 96
  patience: 30
  optimizer: SGD
  lr0: 0.003
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 2
  seed: 49
  close_mosaic: 15

augmentation:
  hsv_h: 0.015
  hsv_s: 0.6
  hsv_v: 0.35
  translate: 0.08
  scale: 0.35
  fliplr: 0.5
  mosaic: 0.4
  mixup: 0.0
  copy_paste: 0.0
  erasing: 0.10

output:
  artifact_dir: /root/autodl-tmp/BSD/artifacts
  name: bsd_v8_yolo26n_noattn_320_stage1
